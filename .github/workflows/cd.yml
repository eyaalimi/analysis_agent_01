# .github/workflows/cd.yml
# Continuous Deployment
#
# Flow:
#   push → dev branch  : auto-deploy to DEV environment
#   push → main branch : terraform plan displayed, then MANUAL approval → deploy to PROD
#
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID_DEV / AWS_SECRET_ACCESS_KEY_DEV
#   AWS_ACCESS_KEY_ID_PROD / AWS_SECRET_ACCESS_KEY_PROD
#   GMAIL_ADDRESS / GMAIL_APP_PASSWORD (used in tfvars)
#
# Required GitHub environments (Settings → Environments):
#   dev  — no protection rules (auto-deploy)
#   prod — required reviewers (manual approval gate)

name: CD

on:
  push:
    branches:
      - dev
      - main

env:
  PYTHON_VERSION: "3.11"
  TERRAFORM_VERSION: "1.7.5"
  AWS_REGION: us-east-1

jobs:
  # ── Deploy to DEV (automatic on push to dev) ──────────────────────────────
  deploy-dev:
    name: Deploy → DEV
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    environment: dev  # No protection rules → deploys automatically

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      # Apply Terraform (creates/updates all AWS infrastructure)
      - name: Terraform init
        run: terraform init
        working-directory: terraform/environments/dev

      - name: Terraform apply
        run: terraform apply -auto-approve -var-file="terraform.tfvars"
        working-directory: terraform/environments/dev

      # Build and push Docker image to ECR
      - name: Build & push Docker image to ECR
        run: |
          ECR_URL=$(terraform -chdir=terraform/environments/dev output -raw ecr_repository_url)
          IMAGE_TAG=$(git rev-parse --short HEAD)
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_URL
          docker build --platform linux/amd64 -t $ECR_URL:$IMAGE_TAG -t $ECR_URL:latest .
          docker push $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "ECR_URL=$ECR_URL" >> $GITHUB_ENV

      # Update Lambda to use the new image
      - name: Update Lambda function code
        run: |
          LAMBDA_NAME=$(terraform -chdir=terraform/environments/dev output -raw lambda_function_name)
          aws lambda update-function-code \
            --function-name $LAMBDA_NAME \
            --image-uri $ECR_URL:$IMAGE_TAG \
            --no-cli-pager

      # Basic smoke tests after deploy
      - name: Smoke tests
        run: |
          pip install -r requirements.txt pytest pytest-mock
          pytest tests/ -v --tb=short
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          BEDROCK_MODEL_ID: us.anthropic.claude-sonnet-4-20250514-v1:0
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          APP_ENV: dev
          LOG_LEVEL: INFO

  # ── Deploy to PROD (manual approval required on push to main) ────────────
  deploy-prod:
    name: Deploy → PROD
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: prod  # ← Requires manual approval configured in GitHub Settings → Environments

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      # Show plan BEFORE applying — reviewer sees exactly what will change
      - name: Terraform init
        run: terraform init
        working-directory: terraform/environments/prod

      - name: Terraform plan (review before apply)
        run: terraform plan -var-file="terraform.tfvars" -no-color
        working-directory: terraform/environments/prod

      # Apply only after the manual approval in GitHub
      - name: Terraform apply
        run: terraform apply -auto-approve -var-file="terraform.tfvars"
        working-directory: terraform/environments/prod

      # Build and push Docker image to ECR (prod)
      - name: Build & push Docker image to ECR
        run: |
          ECR_URL=$(terraform -chdir=terraform/environments/prod output -raw ecr_repository_url)
          IMAGE_TAG=$(git rev-parse --short HEAD)
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_URL
          docker build --platform linux/amd64 -t $ECR_URL:$IMAGE_TAG -t $ECR_URL:latest .
          docker push $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "ECR_URL=$ECR_URL" >> $GITHUB_ENV

      # Update Lambda to use the new image
      - name: Update Lambda function code
        run: |
          LAMBDA_NAME=$(terraform -chdir=terraform/environments/prod output -raw lambda_function_name)
          aws lambda update-function-code \
            --function-name $LAMBDA_NAME \
            --image-uri $ECR_URL:$IMAGE_TAG \
            --no-cli-pager
