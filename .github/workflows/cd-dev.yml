# .github/workflows/cd-dev.yml
# Deploy to DEV — triggers automatically on push to the `dev` branch.
# AWS steps are skipped if AWS_ACCESS_KEY_ID_DEV secret is not configured yet.

name: CD — DEV

on:
  push:
    branches:
      - dev

env:
  PYTHON_VERSION: "3.11"
  TERRAFORM_VERSION: "1.7.5"
  AWS_REGION: us-east-1

jobs:
  deploy-dev:
    name: Deploy → DEV
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # ── AWS credentials (skip all AWS steps if not configured yet) ──────────
      - name: Configure AWS credentials
        id: aws-creds
        if: ${{ secrets.AWS_ACCESS_KEY_ID_DEV != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        if: ${{ secrets.AWS_ACCESS_KEY_ID_DEV != '' }}
        run: terraform init
        working-directory: terraform/environments/dev

      - name: Terraform apply
        if: ${{ secrets.AWS_ACCESS_KEY_ID_DEV != '' }}
        run: terraform apply -auto-approve -var-file="terraform.tfvars"
        working-directory: terraform/environments/dev

      - name: Build & push Docker image to ECR
        if: ${{ secrets.AWS_ACCESS_KEY_ID_DEV != '' }}
        run: |
          ECR_URL=$(terraform -chdir=terraform/environments/dev output -raw ecr_repository_url)
          IMAGE_TAG=$(git rev-parse --short HEAD)
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_URL
          docker build --platform linux/amd64 -t $ECR_URL:$IMAGE_TAG -t $ECR_URL:latest .
          docker push $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "ECR_URL=$ECR_URL" >> $GITHUB_ENV

      - name: Update Lambda function code
        if: ${{ secrets.AWS_ACCESS_KEY_ID_DEV != '' }}
        run: |
          LAMBDA_NAME=$(terraform -chdir=terraform/environments/dev output -raw lambda_function_name)
          aws lambda update-function-code \
            --function-name $LAMBDA_NAME \
            --image-uri $ECR_URL:$IMAGE_TAG \
            --no-cli-pager

      - name: Smoke tests
        if: ${{ secrets.AWS_ACCESS_KEY_ID_DEV != '' }}
        run: |
          pip install -r requirements.txt pytest pytest-mock
          pytest tests/ -v --tb=short
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          BEDROCK_MODEL_ID: us.anthropic.claude-sonnet-4-20250514-v1:0
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          APP_ENV: dev
          LOG_LEVEL: INFO

      - name: AWS not configured — skipping deploy
        if: ${{ secrets.AWS_ACCESS_KEY_ID_DEV == '' }}
        run: echo "AWS_ACCESS_KEY_ID_DEV not set. Add it to GitHub Secrets to enable deployment."
